<!DOCTYPE html>
<html>
<head>
    <title>The Forge - Creative Tools</title>
    <!-- Google Fonts Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* --- Base Dark Theme Styling --- */
        body { font-family: 'Roboto', sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; }
        .title-container { display: flex; align-items: center; justify-content: center; width: 95%; gap: clamp(10px, 2.5vw, 20px); margin-bottom: 15px; }
        .logo-img { height: clamp(40px, 6vw, 60px); width: auto; flex-shrink: 0; }
        h1 { color: #64b5f6; text-align: center; margin: 0; font-size: clamp(1.5em, 5vw, 2.5em); line-height: 1.2; }
        nav { width: 100%; max-width: 1200px; text-align: center; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        nav a { color: #b0b0b0; text-decoration: none; font-weight: bold; padding: 10px 15px; margin: 0 5px; border-radius: 6px; transition: background-color 0.2s, color 0.2s; }
        nav a:hover { background-color: #2a2a2a; color: #fff; }
        nav a.active { color: #fff; background-color: #007bff; }

        /* --- Controls Container Styling --- */
        .controls-container {
            width: 95%;
            max-width: 1200px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }
        #search-bar {
            flex-grow: 1; min-width: 250px; padding: 10px 15px; background-color: #1e1e1e;
            border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 1.1em;
            box-sizing: border-box; transition: border-color 0.2s, box-shadow 0.2s;
        }
        #search-bar:focus { outline: none; border-color: #007bff; box-shadow: 0 0 8px rgba(0, 123, 255, 0.5); }
        .filter-btn {
            background: #333; border: 1px solid #555; color: #e0e0e0; padding: 10px 15px;
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: background-color 0.2s;
        }
        .filter-btn:hover { background-color: #444; }
        .filter-btn.active { background-color: #007bff; color: #fff; }

        .disclaimer { text-align: center; font-style: italic; color: #aaa; max-width: 700px; margin-bottom: 30px; line-height: 1.6; }
        .page-container { width: 95%; max-width: 1200px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; align-items: start; }
        .column-title { font-size: 1.8em; color: #64b5f6; margin-top: 0; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #333; }
        .collapsible { background-color: #1e1e1e; color: #e0e0e0; cursor: pointer; padding: 18px; width: 100%; border: 1px solid #333; border-radius: 8px; text-align: left; outline: none; font-size: 1.2em; font-weight: bold; transition: background-color 0.2s; position: relative; margin-top: 15px; }
        .collapsible:hover, .collapsible.active { background-color: #2a2a2a; }
        .collapsible::after { content: '+'; font-size: 1.5em; color: #aaa; position: absolute; right: 20px; top: 50%; transform: translateY(-50%); transition: transform 0.3s ease; }
        .collapsible.active::after { content: "−"; transform: translateY(-50%) rotate(180deg); }
        .content { padding: 0 18px; max-height: 0; overflow: hidden; background-color: transparent; transition: max-height 0.3s ease-out; }
        .content ul, .manuals-list, .software-list { list-style-type: none; padding: 15px 0 0 0; margin: 0; }
        .tool-card { background-color: #252525; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; transition: transform 0.2s, background-color 0.2s; }
        .tool-card:hover { transform: translateY(-4px); background-color: #333; }
        .tool-link { display: block; text-decoration: none; padding: 20px; }
        .tool-link h2 { margin: 0 0 8px 0; font-size: 1.4em; color: #8ab4f8; }
        .tool-link p { margin: 0 0 15px 0; font-size: 0.95em; color: #b0b0b0; line-height: 1.5; }
        .tags-container { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag { color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 0.8em; font-weight: bold; }
        .tag.websource { background-color: #006064; }
        .tag.program   { background-color: #e65100; }
        .tag.manual    { background-color: #4a148c; }
        
        @media (max-width: 800px) {
            .main-grid { grid-template-columns: 1fr; }
            .controls-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="title-container">
        <img src="logo-white.png" alt="Logo" class="logo-img">
        <h1>The Forge - Creative Tools</h1>
        <img src="logo-white.png" alt="Logo" class="logo-img">
    </div>

    <nav>
        <a href="index.html" class="active">Tools & Manuals</a>
        <a href="workflows.html">Workflows</a>
    </nav>

    <div class="controls-container">
        <input type="text" id="search-bar" placeholder="Search for anything...">
        <button id="filter-all-btn" class="filter-btn active">Show All</button>
        <button id="filter-software-btn" class="filter-btn">Show Software Only</button>
    </div>

    <p class="disclaimer">These are tools I work with. If you are here, you can take advantage of that and also use them. Most of them are full free or free with resetting time limit. Enjoy.</p>
    
    <div class="page-container">
        <div class="main-grid" id="main-grid">
            <div class="column" id="tools-column">
                <h2 class="column-title">Tools</h2>
            </div>
            <div class="column" id="manuals-column">
                <h2 class="column-title">Manuals to my gear</h2>
                <ul class="manuals-list" id="manuals-list"></ul>
            </div>
        </div>
    </div>

    <script>
        const googleSheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSTk4WkCpCLDXiyt_2xyPU3s1y_6W-LeKiUcOQsRHBs5hnqDBb3N2zbCuZxxlSc3YZY2pxoGbjm57pi/pub?output=csv';
        let allData = []; // Store the original full dataset

        document.addEventListener('DOMContentLoaded', () => {
            fetch(googleSheetURL)
                .then(response => response.ok ? response.text() : Promise.reject('Network error'))
                .then(text => {
                    allData = parseCSV(text);
                    applyFiltersAndRender(); // Initial build
                    initializeControls();
                })
                .catch(error => console.error("Error:", error));
        });

        function parseCSV(text) { /* Unchanged from previous version */
            const lines = text.split(/\r\n|\n/).slice(1);
            return lines.map(line => {
                if (!line) return null;
                const values = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];
                if (values.length < 6) return null;
                const obj = {};
                ['name', 'url', 'description', 'category', 'column', 'tags'].forEach((header, i) => {
                    let value = values[i] || '';
                    if (value.startsWith('"') && value.endsWith('"')) value = value.slice(1, -1).replace(/""/g, '"');
                    obj[header] = value.trim();
                });
                obj.tags = obj.tags ? obj.tags.split(',').map(t => t.trim()) : [];
                return obj;
            }).filter(Boolean);
        }

        function clearContent() {
            document.getElementById('tools-column').innerHTML = '<h2 class="column-title">Tools</h2>';
            document.getElementById('manuals-list').innerHTML = '';
        }

        function buildPage(data, isSoftwareOnlyMode) {
            clearContent();
            const toolsColumn = document.getElementById('tools-column');
            const manualsColumn = document.getElementById('manuals-column');
            const mainGrid = document.getElementById('main-grid');

            if (isSoftwareOnlyMode) {
                // --- SOFTWARE ONLY MODE ---
                mainGrid.style.gridTemplateColumns = '1fr'; // Use a single column layout
                manualsColumn.style.display = 'none';
                toolsColumn.querySelector('.column-title').textContent = 'All Software (A-Z)';

                let softwareHtml = '<ul class="software-list">';
                data.forEach(tool => {
                    const tagsHTML = tool.tags.map(tag => `<span class="tag ${tag.toLowerCase()}">${tag}</span>`).join('');
                    softwareHtml += `<li class="tool-card"><a href="${tool.url}" target="_blank" rel="noopener noreferrer" class="tool-link">
                        <h2>${tool.name}</h2><p>${tool.description}</p><div class="tags-container">${tagsHTML}</div></a></li>`;
                });
                softwareHtml += '</ul>';
                toolsColumn.innerHTML += softwareHtml;
            
            } else {
                // --- NORMAL (ALL) MODE ---
                mainGrid.style.gridTemplateColumns = ''; // Revert to CSS default (2 columns)
                manualsColumn.style.display = '';
                toolsColumn.querySelector('.column-title').textContent = 'Tools';

                const tools = data.filter(item => item.column === 'Tools');
                const manuals = data.filter(item => item.column === 'Manuals');
                const toolsCategories = {};
                
                tools.forEach(tool => {
                    if (!toolsCategories[tool.category]) toolsCategories[tool.category] = [];
                    const tagsHTML = tool.tags.map(tag => `<span class="tag ${tag.toLowerCase()}">${tag}</span>`).join('');
                    toolsCategories[tool.category].push(`<li class="tool-card"><a href="${tool.url}" target="_blank" rel="noopener noreferrer" class="tool-link">
                        <h2>${tool.name}</h2><p>${tool.description}</p><div class="tags-container">${tagsHTML}</div></a></li>`);
                });

                let toolsHtmlContent = '';
                for (const category in toolsCategories) {
                    toolsHtmlContent += `<button type="button" class="collapsible">${category}</button>
                                         <div class="content"><ul>${toolsCategories[category].join('')}</ul></div>`;
                }
                toolsColumn.innerHTML += toolsHtmlContent;

                let manualsHtmlContent = '';
                manuals.forEach(manual => {
                    const tagsHTML = manual.tags.map(tag => `<span class="tag ${tag.toLowerCase()}">${tag}</span>`).join('');
                    manualsHtmlContent += `<li class="tool-card"><a href="${manual.url}" target="_blank" rel="noopener noreferrer" class="tool-link">
                        <h2>${manual.name}</h2><p>${manual.description}</p><div class="tags-container">${tagsHTML}</div></a></li>`;
                });
                document.getElementById('manuals-list').innerHTML = manualsHtmlContent;
                initializeCollapsibles();
            }
        }
        
        // --- NEW: Central Controller Function ---
        let isSoftwareMode = false;
        function applyFiltersAndRender() {
            const query = document.getElementById('search-bar').value.toLowerCase().trim();
            let filteredData = allData;

            if (isSoftwareMode) {
                filteredData = allData.filter(item => item.tags.includes('Program'));
            }

            if (query) {
                filteredData = filteredData.filter(item => 
                    item.name.toLowerCase().includes(query) || 
                    item.description.toLowerCase().includes(query)
                );
            }
            
            if (isSoftwareMode) {
                filteredData.sort((a, b) => a.name.localeCompare(b.name));
            }
            
            buildPage(filteredData, isSoftwareMode);
        }

        function initializeControls() {
            const searchBar = document.getElementById('search-bar');
            const allBtn = document.getElementById('filter-all-btn');
            const softwareBtn = document.getElementById('filter-software-btn');
            
            searchBar.addEventListener('input', applyFiltersAndRender);
            
            allBtn.addEventListener('click', () => {
                isSoftwareMode = false;
                allBtn.classList.add('active');
                softwareBtn.classList.remove('active');
                applyFiltersAndRender();
            });

            softwareBtn.addEventListener('click', () => {
                isSoftwareMode = true;
                softwareBtn.classList.add('active');
                allBtn.classList.remove('active');
                applyFiltersAndRender();
            });
        }

        function initializeCollapsibles() {
            document.querySelectorAll(".collapsible").forEach(button => {
                button.addEventListener("click", function() {
                    this.classList.toggle("active");
                    const content = this.nextElementSibling;
                    if (content.style.maxHeight) {
                        content.style.maxHeight = null;
                    } else {
                        content.style.maxHeight = content.scrollHeight + "px";
                    } 
                });
            });
        }
    </script>
</body>
</html>
